name: examhub
description: 资格考试信息平台 - 中国最全的资格考试信息聚合App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.0
  intl: ^0.18.1
  fl_chart: ^0.65.0
  share_plus: ^7.2.0
  url_launcher: ^6.2.0
  flutter_local_notifications: ^16.3.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true
  assets:
    - assets/
